services:
  # ── BACKEND ────────────────────────────────────────────────────────────────
  - type: web
    name: dani-backend-ea0s
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

  # ── FRONTEND ───────────────────────────────────────────────────────────────
  - type: static
    name: dani-frontend-ea0s
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: dani-backend-ea0s
          property: host
