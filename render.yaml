services:
  # ── BACKEND ────────────────────────────────────────────────────────────────
  - type: web
    name: dani-backend-ea0s
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

  # ── FRONTEND ───────────────────────────────────────────────────────────────
  - type: static
    name: dani-frontend-ea0s
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_BACKEND_URL
        value: https://dani-backend-ea0s.onrender.com
      - key: VITE_MAPBOX_TOKEN
        value: pk.eyJ1Ijoia2lra29kZXJpc28iLCJhIjoiY21uYWszMTIxMGp3NzJzc2JraDhwbTU5ayJ9.-60pgYn_BXERAHA7AqVgqA
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
