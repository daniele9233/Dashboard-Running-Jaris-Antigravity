services:
  # ── BACKEND ────────────────────────────────────────────────────────────────
  - type: web
    name: dani-backend-ea0s
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # --loop asyncio --http h11 --ws none: evita le estensioni native uvloop/
    # httptools/websockets che uvicorn[standard] auto-seleziona su Linux. Il
    # 2026-06-11 due deploy consecutivi sono morti in "port scan timeout" senza
    # traceback nel build log: pip senza cache aveva risolto uvloop 0.22.1 e
    # httptools 0.8.0 freschi contro uvicorn 0.30.6 (2024). Implementazioni
    # pure-Python = nessun rischio ABI; perf irrilevante per app single-user.
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT --loop asyncio --http h11 --ws none
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: FRONTEND_URL
        value: https://dani-frontend-y63x.onrender.com
      - key: BACKEND_URL
        value: https://dani-backend-ea0s.onrender.com

  # ── FRONTEND ───────────────────────────────────────────────────────────────
  # URL pubblico effettivo: https://dani-frontend-y63x.onrender.com
  # (Render ha generato suffix random `y63x` quando il nome era già preso)
  - type: static
    name: dani-frontend-ea0s
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_BACKEND_URL
        value: https://dani-backend-ea0s.onrender.com
      - key: VITE_MAPBOX_TOKEN
        value: pk.eyJ1Ijoia2lra29kZXJpc28iLCJhIjoiY21uYWszMTIxMGp3NzJzc2JraDhwbTU5ayJ9.-60pgYn_BXERAHA7AqVgqA
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
