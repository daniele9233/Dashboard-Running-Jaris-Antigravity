<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Garmin Auth</title>
  <style>
    body { margin: 0; background: #0a0a0a; color: #fff; font-family: sans-serif;
           display: flex; flex-direction: column; align-items: center;
           justify-content: center; height: 100vh; gap: 16px; }
    .spinner { width: 40px; height: 40px; border: 3px solid #333;
               border-top-color: #00FFAA; border-radius: 50%;
               animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #aaa; font-size: 14px; }
    .ok  { color: #00FFAA; font-size: 18px; font-weight: 600; }
    .err { color: #ef4444; font-size: 16px; }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <p id="msg">Autenticazione Garmin in corso...</p>

  <script>
    (async () => {
      const spinner = document.getElementById('spinner');
      const msg     = document.getElementById('msg');

      // BroadcastChannel — works between same-origin windows WITHOUT window.opener
      // (Garmin clears window.opener for security, so postMessage would fail)
      const bc = new BroadcastChannel('garmin_auth');

      function notify(status, detail) {
        bc.postMessage({ status, detail });
        bc.close();
      }

      // 1. Read ticket from URL
      const params  = new URLSearchParams(window.location.search);
      const ticket  = params.get('ticket');
      const service = window.location.origin + '/garmin-auth.html';

      if (!ticket) {
        spinner.style.display = 'none';
        msg.className = 'err';
        msg.textContent = 'Nessun ticket ricevuto da Garmin.';
        notify('error', 'missing ticket');
        return;
      }

      // 2. Read API base from localStorage (set by parent before opening popup)
      const apiBase = localStorage.getItem('garmin_api_base')
                   || 'https://dani-backend-ea0s.onrender.com';

      try {
        // 3. Exchange ticket with backend (30s timeout)
        const controller = new AbortController();
        const tid = setTimeout(() => controller.abort(), 30000);

        const res = await fetch(apiBase + '/api/garmin/exchange-ticket', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ticket, service }),
          signal: controller.signal,
        });
        clearTimeout(tid);

        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: 'exchange failed' }));
          throw new Error(err.error || 'Scambio ticket fallito (' + res.status + ')');
        }

        // 4. Success
        spinner.style.display = 'none';
        msg.className = 'ok';
        msg.textContent = '✓ Garmin autenticato!';
        notify('complete', null);
        setTimeout(() => window.close(), 1200);

      } catch (e) {
        spinner.style.display = 'none';
        msg.className = 'err';
        msg.textContent = 'Errore: ' + e.message;
        notify('error', e.message);
        // Don't auto-close on error so user can read the message
      }
    })();
  </script>
</body>
</html>
