<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garmin Authentication</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      max-width: 300px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #C0FF00;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .text {
      font-size: 14px;
      font-weight: 600;
      color: #888;
    }
    .error {
      color: #f43f5e;
      font-size: 12px;
      margin-top: 8px;
    }
    .success {
      color: #10B981;
      font-size: 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading">
      <div class="spinner"></div>
      <div class="text">Completing Garmin authentication...</div>
    </div>
    <div id="success" style="display:none;">
      <div class="success">✓ Authentication successful!</div>
      <div class="text" style="margin-top:8px;">You can close this window.</div>
    </div>
    <div id="error" class="error" style="display:none;"></div>
  </div>
  <script>
    (function() {
      try {
        // Extract ticket from URL query params
        const params = new URLSearchParams(window.location.search);
        const ticket = params.get('ticket');
        
        if (!ticket) {
          throw new Error('No ticket found in URL. Please try again.');
        }

        // Get the service URL (same as what was passed to Garmin SSO)
        const service = window.location.origin + '/garmin-auth.html';

        // Send ticket to parent window via postMessage
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage({
            type: 'garmin-auth',
            ticket: ticket,
            service: service
          }, '*');
        }

        // Show success
        document.getElementById('loading').style.display = 'none';
        document.getElementById('success').style.display = 'block';
        
        // Auto-close after 2 seconds
        setTimeout(function() { window.close(); }, 2000);
      } catch (err) {
        console.error('Garmin auth error:', err);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Error: ' + err.message;
      }
    })();
  </script>
</body>
</html>
